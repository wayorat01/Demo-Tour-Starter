name: Cleanup Demo Environment

on:
  schedule:
    # Run at 12:00 and 00:00 UTC
    - cron: '0 0,12 * * *'
  # Allow manual triggering for testing
  workflow_dispatch:

jobs:
  cleanup-demo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Restore Demo Environment
        run: |
          curl https://demo-payblocks.trieb.work/next/backup/restore \
            -H "Authorization: Bearer ${{ secrets.DEMO_RESTORE_TOKEN }}" \
            --data '{"url":"https://demo-payblocks.trieb.work/seed/demo-payblocks---demo-payblocks.trieb.work---1739813600714.json"}'
