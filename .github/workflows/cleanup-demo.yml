name: Cleanup Demo Environment

on:
  schedule:
    # Run at 12:00 and 00:00 UTC
    - cron: '0 0,12 * * *'
  # Allow manual triggering for testing
  workflow_dispatch:

jobs:
  cleanup-demo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set demo token as environment variable
        run: echo "DEMO_RESTORE_TOKEN=${{ secrets.DEMO_RESTORE_TOKEN }}" >> $GITHUB_ENV

      - name: Restore Demo Environment
        if: env.DEMO_RESTORE_TOKEN != ''
        run: |
          curl https://demo-payblocks.trieb.work/next/backup/restore \
            -H "Authorization: Bearer $DEMO_RESTORE_TOKEN" \
            --data '{"url":"https://p3mqqryrdkxnvazk.public.blob.vercel-storage.com/backups/manual---cluster0.2v84v.mongodb.net%252Fdemo-payblocks---demo-payblocks.trieb.work---1746779540383.tar-hXhm6LmE0pRLvpZUQ4K0A67BZOwGaD.gz"}'
